    <!DOCTYPE html>
    <html lang="en">

    <head>
      <title>Number Guessing Game</title>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">

      <!-- Bootstrap CSS -->
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>

    <body class="bg-light">

      <div class="container mt-5">
        <div class="card p-4 shadow">

          <h3 class="text-center mb-4">Number Guessing Game</h3>

          <form action="/guess" method="post">

            <div class="mb-3">
              <label for="guess" class="form-label">Guess Number</label>
              <input type="number" class="form-control" id="guess" name="guessNumber"
                placeholder="Enter your guess number" name="guess">
            </div>

            <div class="mb-3">
              <button type="submit" class="btn btn-primary w-25">Submit</button>
            </div>

            <div class="form-check mb-2">
              <input class="form-check-input" type="checkbox" id="high">
              <label class="form-check-label" for="high">
                Too High!
              </label>
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="attempt">
              <label class="form-check-label" for="attempt">
                Attempts: {{ attempts }}
              </label>
            </div>
          </form>

          <a href="{{ url_for('reset') }}" class="btn btn-danger" style="width: 25%;">Restart Game</a>
          <h3 class="text-center mt-4">{{ number_guess }}</h3>
          <p class="text-center">{{ feedback }}</p>
        </div>

      </div>

      <!-- Bootstrap JS -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    </body>

    </html>
